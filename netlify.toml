[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/razorpay/order"
  to = "/.netlify/functions/razorpay-order"
  status = 200

[[redirects]]
  from = "/api/razorpay/verify"
  to = "/.netlify/functions/razorpay-verify"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
